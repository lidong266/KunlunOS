name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  monorepo:
    name: Monorepo — 9 packages (产品包) + fork + extension
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build all packages
        run: pnpm -r build

      - name: Verify build output
        run: |
          for pkg in packages/kunlun-*/; do
            name=$(basename "$pkg")
            # kunlun-os-core 使用 tsc --noEmit（仅类型检查，不产出 dist）
            if [ "$name" = "kunlun-os-core" ]; then
              echo "⏭️  $name (type-check only, no dist)"
              continue
            fi
            if [ -f "$pkg/dist/index.js" ] || [ -f "$pkg/dist/index.d.ts" ]; then
              echo "✅ $name built"
            else
              echo "❌ $name MISSING dist output"
              exit 1
            fi
          done

      - name: Run unit tests
        run: pnpm -r test

      # 黄金测试条：固化核心包回归，避免个别包 vitest 配置异常导致静默漏测
      # 指定包路径（而非根目录 `vitest run`）以规避无根配置时的混合扫描冲突
      - name: Run core golden tests (kunlun-os-core, 109 tests)
        run: npx vitest run packages/kunlun-os-core
        continue-on-error: false

      - name: Run integration tests
        run: pnpm vitest run integration-tests --config integration-tests/vitest.config.ts

      - name: Summary
        run: echo "✅ Monorepo build + unit + integration tests passed"

  fork:
    name: Fork — pi-agent-core with ternary injection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: monorepo

    defaults:
      run:
        working-directory: ./fork/packages/agent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install fork dependencies
        run: npm install

      - name: Build fork JS
        run: npm run build:js

      - name: Build fork declarations
        run: npm run build:types || true  # type errors from original pi source, tolerated

      - name: Verify ternary injection in bundle
        run: |
          echo "=== Bundle checks ==="
          [ -f dist/index.js ] && echo "✅ dist/index.js exists" || { echo "❌ missing index.js"; exit 1; }
          grep -q "runKunlunAnalysis" dist/index.js && echo "✅ runKunlunAnalysis" || { echo "❌ missing"; exit 1; }
          grep -q "decideToolCall" dist/index.js && echo "✅ decideToolCall" || { echo "❌ missing"; exit 1; }
          grep -q "formatAnalysisForPrompt" dist/index.js && echo "✅ formatAnalysisForPrompt" || { echo "❌ missing"; exit 1; }
          grep -q "sortToolCallsByPriority" dist/index.js && echo "✅ sortToolCallsByPriority" || { echo "❌ missing"; exit 1; }

      - name: Verify runtime exports
        run: |
          node -e "
            import('./dist/index.js').then(m => {
              const checks = [
                ['registerKunlunEngine', typeof m.registerKunlunEngine === 'function'],
                ['runKunlunAnalysis', typeof m.runKunlunAnalysis === 'function'],
                ['formatAnalysisForPrompt', typeof m.formatAnalysisForPrompt === 'function'],
                ['decideToolCall', typeof m.decideToolCall === 'function'],
                ['decideToolCallBatch', typeof m.decideToolCallBatch === 'function'],
                ['sortToolCallsByPriority', typeof m.sortToolCallsByPriority === 'function'],
                ['getLatestAnalysis', typeof m.getLatestAnalysis === 'function'],
                ['isKunlunEngineLoaded', typeof m.isKunlunEngineLoaded === 'function'],
                ['Agent', typeof m.Agent === 'function'],
                ['agentLoop', typeof m.agentLoop === 'function'],
              ];
              let allOk = true;
              for (const [name, ok] of checks) {
                console.log(ok ? '✅' : '❌', name);
                if (!ok) allOk = false;
              }
              if (!allOk) process.exit(1);
            }).catch(e => { console.error('❌ Import failed:', e.message); process.exit(1); });
          "

      - name: Run kunlun-bridge tests
        run: npx vitest run test/kunlun-bridge.test.ts

  extension:
    name: Extension — pi-kunlun loader check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: fork

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install extension deps
        run: |
          cd extension
          npm install

      - name: Resolve all extension deps
        run: |
          cd extension
          echo "=== Dependency resolution ==="
          node --experimental-strip-types -e "
            const deps = [
              '@kunlun/ternary', '@kunlun/contradiction', '@kunlun/eventbus',
              '@kunlun/presence', '@kunlun/spiral', '@kunlun/pw',
              '@kunlun/ocgs', '@kunlun/subsystems',
              '@earendil-works/pi-agent-core', 'typebox',
            ];
            let allOk = true;
            for (const d of deps) {
              try {
                const m = await import(d);
                const keys = Object.keys(m).filter(k => !k.startsWith('_')).slice(0,3).join(', ');
                console.log('✅', d, '→', keys);
              } catch(e) {
                console.log('❌', d, '→', e.message?.slice(0,80));
                allOk = false;
              }
            }
            process.exit(allOk ? 0 : 1);
          "

      - name: Verify extension module loads
        run: |
          cd extension
          node --experimental-strip-types -e "
            import('./index.ts').then(m => {
              const ok = typeof m.default === 'function';
              console.log(ok ? '✅ Extension exports default function' : '❌ Extension missing default export');
              if (!ok) process.exit(1);
            }).catch(e => {
              console.error('❌ Extension load failed:', e.message?.slice(0,100));
              process.exit(1);
            });
          "

      - name: Verify persistent memory
        run: |
          cd extension
          node --experimental-strip-types -e "
            const { PersistentMemoryStore } = await import('./persistent-memory.ts');
            const store = new PersistentMemoryStore('/tmp/ci-kunlun-memory.db');
            store.store('CI test memory', 'ci', ['ci']);
            const stats = store.getStats();
            console.log('✅ PersistentMemoryStore works:', JSON.stringify(stats));
            store.close();
          "

      - name: Summary
        run: echo "✅ All checks passed - monorepo, fork and extension"
